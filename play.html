<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Play — Guess The Prompt</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="screen-wrap" style="max-width:500px">
  <div class="brand">MANN+HUMMEL <span>×</span> I2M</div>
  <div id="content"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>

<script>
const C=document.getElementById("content");
const me=uid();
let myName=localStorage.getItem("gp_name")||"";

let G={};
let lastRenderKey=""; // sadece bu değişince yeniden çizeriz

function saveName(){
  const n=document.getElementById("nm").value.trim();
  if(!n){alert("Enter a name");return;}
  myName=n; localStorage.setItem("gp_name",n);
  playersRef.child(me).set({name:n});
  lastRenderKey=""; // ismi girince mutlaka yeniden çiz
  renderCurrent(true);
}

gameRef.on("value",s=>{ G=s.val()||{}; renderCurrent(false); });

function renderCurrent(force){
  const ph=G.phase||"lobby";
  const idx=G.currentPhoto??-1;

  // Bu kullanıcının kendi durumu (gönderdi mi / oy verdi mi)
  const iSubmitted = !!(G.guesses && G.guesses[idx] && G.guesses[idx][me]);
  const iVoted      = !!(G.votes   && G.votes[idx]   && G.votes[idx][me]);

  // Render anahtarı: SADECE bunlar değişince ekranı yeniden çiz.
  // Başkasının guess/vote'u gelince bu anahtar DEĞİŞMEZ -> ekran sabit kalır.
  const nameState = myName ? "named" : "noname";
  const key = `${nameState}|${ph}|${idx}|${iSubmitted}|${iVoted}`;

  if(!force && key===lastRenderKey){
    // Sadece oylama ekranında oy sayıları güncellensin (textarea yok orada)
    if(ph==="vote") updateVoteCountsOnly(idx);
    return; // EKRANI YENİDEN ÇİZME -> yazdığın yazı silinmez
  }
  lastRenderKey=key;

  if(!myName){
    C.innerHTML=`<div class="card"><h1>Enter your name</h1>
      <input id="nm" placeholder="Your name">
      <button class="btn yellow" onclick="saveName()">Join 🎮</button></div>`;
    return;
  }

  if(ph==="lobby"){
    C.innerHTML=`<div class="card"><h2>Hi ${esc(myName)} 👋</h2>
      <p class="muted">Waiting for the game to start...</p></div>`;
    return;
  }

  if(ph==="guess"){
    // Check if time is already up
    const timeUp = G.timer && G.timer.endsAt && Date.now() > G.timer.endsAt;

    if(timeUp){
      C.innerHTML=`<div class="card"><h2>⏰ Time's up!</h2>
        <p class="muted">Look at the big screen 📺</p></div>`;
      return;
    }
    if(iSubmitted){
      const myGuess=G.guesses[idx][me];
      C.innerHTML=`<div class="card"><h2>✅ Guess submitted!</h2>
        <div class="guess-item">${esc(myGuess.text)}</div>
        <p class="muted">Waiting for others...</p></div>`;
    } else {
      C.innerHTML=`<div class="card"><span class="tag">Photo ${idx+1}</span>
        <h2>What's the prompt? 🤔</h2>
        <textarea id="gtext" placeholder="Type your guess..."></textarea>
        <button class="btn yellow" onclick="submitGuess(${idx})">Submit</button></div>`;
    }
    return;
  }


  if(ph==="show"){
    C.innerHTML=`<div class="card"><h2>👀 Check the big screen</h2>
      <p class="muted">All guesses are being shown.</p></div>`;
    return;
  }

  if(ph==="vote"){
    const guesses=(G.guesses&&G.guesses[idx])||{};
    let html=`<div class="card"><span class="tag">Photo ${idx+1}</span><h2>🗳 Vote the best guess</h2>`;
    Object.entries(guesses).forEach(([u,x])=>{
      if(u===me) return; // can't vote for your own
      const sel=iVoted && G.votes[idx][me]===u ? "selected":"";
      // Author name hidden on purpose — only the prompt text is shown
      html+=`<button class="vote-btn ${sel}" id="vb_${u}" onclick="vote(${idx},'${u}')">
        💬 ${esc(x.text)}
        <span class="check">✓</span>
      </button>`;
    });
    if(Object.keys(guesses).filter(u=>u!==me).length===0) html+=`<p class="muted">No one else to vote for.</p>`;
    html+=`</div>`;
    C.innerHTML=html;
    return;
  }


  if(ph==="winner"||ph==="reveal"){
    C.innerHTML=`<div class="card"><h2>👀 Look at the big screen!</h2></div>`;
    return;
  }
  if(ph==="final"){
    C.innerHTML=`<div class="card"><h2>🎉 Game Over!</h2><p class="muted">Thanks for playing, ${esc(myName)}!</p></div>`;
    return;
  }
  C.innerHTML=`<div class="card"><p class="muted">Waiting...</p></div>`;
}

// On the vote screen, only update which button is selected (no full re-render)
function updateVoteCountsOnly(idx){
  if(!(G.votes && G.votes[idx] && G.votes[idx][me])) return;
  const myV=G.votes[idx][me];
  document.querySelectorAll(".vote-btn").forEach(b=>b.classList.remove("selected"));
  const el=document.getElementById("vb_"+myV);
  if(el) el.classList.add("selected");
}


function submitGuess(idx){
  const t=document.getElementById("gtext").value.trim();
  if(!t){alert("Write something");return;}
  if(G.timer&&G.timer.endsAt&&Date.now()>G.timer.endsAt){alert("Time is up!");return;}
  gameRef.child("guesses/"+idx+"/"+me).set({name:myName,text:t});
}
function vote(idx,u){
  if(G.timer&&G.timer.endsAt&&Date.now()>G.timer.endsAt){alert("Voting closed!");return;}
  gameRef.child("votes/"+idx+"/"+me).set(u);
}

// Watch the timer: when it expires during the guess phase,
// force a re-render so the submit screen turns into "Time's up".
let lastTimeUp=false;
setInterval(()=>{
  if((G.phase||"")!=="guess") { lastTimeUp=false; return; }
  const timeUp = G.timer && G.timer.endsAt && Date.now() > G.timer.endsAt;
  if(timeUp && !lastTimeUp){
    lastTimeUp=true;
    lastRenderKey=""; // force a full re-render
    renderCurrent(true);
  }
  if(!timeUp) lastTimeUp=false;
},500);


</script>
</body>
</html>
