<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Screen — Guess The Prompt</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="screen-wrap">
  <div class="brand" style="font-size:22px">MANN+HUMMEL <span>×</span> I2M — Guess The Prompt</div>
  <div id="content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
<script>
const C=document.getElementById("content");
let timerInt=null;

function playURL(){ return location.href.replace(/screen\.html.*$/,"play.html"); }

gameRef.on("value",s=>{
  const g=s.val()||{}; render(g);
});

function startCountdown(endsAt,el){
  clearInterval(timerInt);
  timerInt=setInterval(()=>{
    const left=Math.max(0,Math.ceil((endsAt-Date.now())/1000));
    if(el) el.textContent=left;
    if(left<=0) clearInterval(timerInt);
  },200);
}

function render(g){
  const ph=g.phase||"lobby";
  const idx=g.currentPhoto??-1;
  const photo=(g.photos||[])[idx];

  if(ph==="lobby"){
    C.innerHTML=`<h1>Scan to Join 📱</h1><div class="qr-wrap" id="qr"></div>
      <p class="muted">Open the link & enter your name</p>`;
    new QRCode(document.getElementById("qr"),{text:playURL(),width:240,height:240});
    return;
  }

  if(ph==="guess" && photo){
    C.innerHTML=`<span class="tag">Photo ${idx+1}</span>
      <img class="photo-big" src="${esc(photo.url)}">
      <div class="timer" id="t">${g.timer?'':'⏳'}</div>
      <p class="muted">Write your guess on your phone!</p>`;
    if(g.timer&&g.timer.running) startCountdown(g.timer.endsAt,document.getElementById("t"));
    return;
  }

  if(ph==="show" && photo){
    const guesses=(g.guesses&&g.guesses[idx])||{};
    const items=Object.values(guesses).map(x=>`<div class="guess-item">💬 ${esc(x.text)}<br><span class="small">— ${esc(x.name)}</span></div>`).join("")||"<p class='muted'>No guesses</p>";
    C.innerHTML=`<span class="tag">Photo ${idx+1} — Guesses</span>
      <img class="photo-big" src="${esc(photo.url)}" style="max-height:35vh">
      <div class="list">${items}</div>`;
    return;
  }

  if(ph==="vote" && photo){
    const guesses=(g.guesses&&g.guesses[idx])||{};
    const votes=(g.votes&&g.votes[idx])||{};
    const tally={};
    Object.values(votes).forEach(v=>tally[v]=(tally[v]||0)+1);
    const items=Object.entries(guesses).map(([u,x])=>
      `<div class="guess-item">💬 ${esc(x.text)} <span class="tag">${tally[u]||0} votes</span><br><span class="small">— ${esc(x.name)}</span></div>`).join("");
    C.innerHTML=`<span class="tag">Photo ${idx+1} — VOTE NOW</span>
      <div class="timer" id="t"></div>
      <div class="list">${items}</div>
      <p class="muted">Vote on your phone 📱</p>`;
    if(g.timer&&g.timer.running) startCountdown(g.timer.endsAt,document.getElementById("t"));
    return;
  }

  if(ph==="winner" && photo){
    const guesses=(g.guesses&&g.guesses[idx])||{};
    const votes=(g.votes&&g.votes[idx])||{};
    const tally={};
    Object.values(votes).forEach(v=>tally[v]=(tally[v]||0)+1);
    let bestU=null,best=-1;
    Object.keys(guesses).forEach(u=>{ if((tally[u]||0)>best){best=tally[u]||0;bestU=u;} });
    const w=guesses[bestU];
    C.innerHTML=`<h1>🏆 Round Winner!</h1>
      ${w?`<div class="winner">${esc(w.name)}</div>
      <div class="guess-item">💬 ${esc(w.text)}</div>
      <p class="muted">${best} votes</p>`:"<p class='muted'>No votes</p>"}`;
    return;
  }

  if(ph==="reveal" && photo){
    C.innerHTML=`<h1>💡 The Real Prompt Was...</h1>
      <img class="photo-big" src="${esc(photo.url)}" style="max-height:35vh">
      <div class="reveal-box">"${esc(photo.realPrompt)}"</div>`;
    return;
  }

  if(ph==="final"){
    // overall scoreboard: total votes received across all photos
    const scores={};
    const votes=g.votes||{}; const guesses=g.guesses||{};
    Object.keys(votes).forEach(pi=>{
      Object.values(votes[pi]).forEach(votedU=>{
        const name=(guesses[pi]&&guesses[pi][votedU]&&guesses[pi][votedU].name)||votedU;
        scores[name]=(scores[name]||0)+1;
      });
    });
    const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
    const list=sorted.map(([n,s],i)=>`<div class="guess-item">${i===0?'👑':'#'+(i+1)} <b>${esc(n)}</b> — ${s} votes</div>`).join("")||"<p class='muted'>No data</p>";
    C.innerHTML=`<h1>🎉 Final Scoreboard</h1>${list}`;
    return;
  }

  C.innerHTML=`<h1>Waiting...</h1>`;
}
</script>
</body>
</html>
