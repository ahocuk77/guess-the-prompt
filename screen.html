<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Screen — Guess The Prompt</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="screen-wrap">
  <div class="brand" style="font-size:22px">MANN+HUMMEL <span>×</span> I2M — Guess The Prompt</div>
  <div id="content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
<script>
const C=document.getElementById("content");
let G={};
let lastRenderKey="";

// Timer runs completely independently from render(), so guesses/votes
// coming in can never disturb it.
let timerLoop=null;
let timerTargetEndsAt=null; // the endsAt this timer is counting to

function playURL(){ return location.href.replace(/screen\.html.*$/,"play.html"); }

gameRef.on("value",s=>{ G=s.val()||{}; render(); syncTimer(); });

// ---- Independent timer engine ----
function syncTimer(){
  const running = G.timer && G.timer.running;
  const endsAt  = running ? G.timer.endsAt : null;

  if(!running){
    // No active timer -> stop loop
    stopTimer();
    timerTargetEndsAt=null;
    return;
  }
  // Already counting to this exact endsAt? Do nothing (prevents restart/flicker).
  if(timerTargetEndsAt===endsAt && timerLoop) return;

  timerTargetEndsAt=endsAt;
  stopTimer();
  const paint=()=>{
    const el=document.getElementById("t");
    if(!el) return; // timer not on screen right now
    const left=Math.max(0,Math.ceil((endsAt-Date.now())/1000));
    el.textContent=left;
  };
  paint();
  timerLoop=setInterval(paint,250);
}
function stopTimer(){ if(timerLoop){ clearInterval(timerLoop); timerLoop=null; } }

// ---- Render: rebuild DOM only on real view change ----
function render(){
  const ph=G.phase||"lobby";
  const idx=G.currentPhoto??-1;

  // Timer is NOT part of the key anymore -> render won't react to timer.
  const key=`${ph}|${idx}`;
  const sameView=(key===lastRenderKey);

  if(sameView){
    updateDynamic(ph,idx);
    return; // do not touch the DOM container, timer keeps running
  }
  lastRenderKey=key;

  const photo=(G.photos||[])[idx];

  if(ph==="lobby"){
    C.innerHTML=`<h1>Scan to Join 📱</h1><div class="qr-wrap" id="qr"></div>
      <p class="muted">Open the link & enter your name</p>`;
    new QRCode(document.getElementById("qr"),{text:playURL(),width:240,height:240});
    return;
  }

  if(ph==="guess" && photo){
    C.innerHTML=`<span class="tag">Photo ${idx+1}</span>
      <img class="photo-big" src="${esc(photo.url)}">
      <div class="timer" id="t">⏳</div>
      <p class="muted">Write your guess on your phone!</p>`;
    return;
  }

  if(ph==="show" && photo){
    C.innerHTML=`<span class="tag">Photo ${idx+1} — Guesses</span>
      <img class="photo-big" src="${esc(photo.url)}" style="max-height:35vh">
      <div class="list" id="guessList"></div>`;
    renderGuessList(idx);
    return;
  }

  if(ph==="vote" && photo){
    C.innerHTML=`<span class="tag">Photo ${idx+1} — VOTE NOW</span>
      <div class="timer" id="t">⏳</div>
      <div class="list" id="voteList"></div>
      <p class="muted">Vote on your phone 📱</p>`;
    renderVoteList(idx);
    return;
  }

  if(ph==="winner" && photo){ renderWinner(idx); return; }

  if(ph==="reveal" && photo){
    C.innerHTML=`<h1>💡 The Real Prompt Was...</h1>
      <img class="photo-big" src="${esc(photo.url)}" style="max-height:35vh">
      <div class="reveal-box">"${esc(photo.realPrompt)}"</div>`;
    return;
  }

  if(ph==="final"){ renderFinal(); return; }

  C.innerHTML=`<h1>Waiting...</h1>`;
}

// Update only dynamic content while staying on the same view.
function updateDynamic(ph,idx){
  if(ph==="show") renderGuessList(idx);
  else if(ph==="vote") renderVoteList(idx);
  else if(ph==="winner") renderWinner(idx);
  else if(ph==="final") renderFinal();
  // "guess" phase: nothing dynamic to update -> leave DOM and timer alone
}

function renderGuessList(idx){
  const el=document.getElementById("guessList"); if(!el) return;
  const guesses=(G.guesses&&G.guesses[idx])||{};
  el.innerHTML=Object.values(guesses).map(x=>
    `<div class="guess-item">💬 ${esc(x.text)}<br><span class="small">— ${esc(x.name)}</span></div>`
  ).join("")||"<p class='muted'>No guesses</p>";
}

function renderVoteList(idx){
  const el=document.getElementById("voteList"); if(!el) return;
  const guesses=(G.guesses&&G.guesses[idx])||{};
  const votes=(G.votes&&G.votes[idx])||{};
  const tally={};
  Object.values(votes).forEach(v=>tally[v]=(tally[v]||0)+1);
  el.innerHTML=Object.entries(guesses).map(([u,x])=>
    `<div class="guess-item">💬 ${esc(x.text)} <span class="tag">${tally[u]||0} votes</span><br><span class="small">— ${esc(x.name)}</span></div>`
  ).join("");
}

function renderWinner(idx){
  const guesses=(G.guesses&&G.guesses[idx])||{};
  const votes=(G.votes&&G.votes[idx])||{};
  const tally={};
  Object.values(votes).forEach(v=>tally[v]=(tally[v]||0)+1);
  let bestU=null,best=-1;
  Object.keys(guesses).forEach(u=>{ if((tally[u]||0)>best){best=tally[u]||0;bestU=u;} });
  const w=guesses[bestU];
  C.innerHTML=`<h1>🏆 Round Winner!</h1>
    ${w?`<div class="winner">${esc(w.name)}</div>
    <div class="guess-item">💬 ${esc(w.text)}</div>
    <p class="muted">${best} votes</p>`:"<p class='muted'>No votes</p>"}`;
}

function renderFinal(){
  const scores={};
  const votes=G.votes||{}; const guesses=G.guesses||{};
  Object.keys(votes).forEach(pi=>{
    Object.values(votes[pi]).forEach(votedU=>{
      const name=(guesses[pi]&&guesses[pi][votedU]&&guesses[pi][votedU].name)||votedU;
      scores[name]=(scores[name]||0)+1;
    });
  });
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const list=sorted.map(([n,s],i)=>
    `<div class="guess-item">${i===0?'👑':'#'+(i+1)} <b>${esc(n)}</b> — ${s} votes</div>`
  ).join("")||"<p class='muted'>No data</p>";
  C.innerHTML=`<h1>🎉 Final Scoreboard</h1>${list}`;
}


</script>
</body>
</html>
